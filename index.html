<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">

    <style>
        body { background: #050505; color: white; font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; flex-direction: column; align-items: center; }
        .hero { width: 100%; padding: 40px 20px; text-align: center; background: linear-gradient(180deg, #1a0505 0%, #050505 100%); border-bottom: 1px solid #331111; }
        .hero h1 { color: #ff4d4d; font-size: 32px; letter-spacing: 4px; margin: 0; }
        .hero p { color: #888; margin-top: 10px; font-size: 14px; }
        
        .live-counter { background: rgba(0,255,136,0.1); color: #00ff88; padding: 5px 15px; border-radius: 20px; font-size: 12px; margin-top: 15px; display: inline-flex; align-items: center; gap: 8px; border: 1px solid rgba(0,255,136,0.3); }
        .pulse-dot { width: 8px; height: 8px; background: #00ff88; border-radius: 50%; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { transform: scale(1); opacity: 1; } 50% { transform: scale(1.5); opacity: 0.5; } 100% { transform: scale(1); opacity: 1; } }

        .game-grid { display: grid; grid-template-columns: 1fr; gap: 20px; padding: 20px; width: 100%; max-width: 400px; }
        .game-card { background: #111; border: 1px solid #222; border-radius: 15px; overflow: hidden; transition: transform 0.2s; cursor: pointer; position: relative; }
        .game-card:hover { transform: translateY(-5px); border-color: #ff4d4d; }
        .game-info { padding: 15px; }
        .game-info h3 { margin: 0; color: #ff4d4d; }
        .game-info p { font-size: 12px; color: #666; margin: 5px 0 0 0; }

        #sales-ticker { position: fixed; top: 10px; right: 10px; background: rgba(0,0,0,0.85); border: 1px solid #d4af37; border-radius: 10px; padding: 10px; font-size: 11px; color: #d4af37; z-index: 2000; display: none; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        
        .viral-btn { background: #1da1f2; color: white; border: none; padding: 10px 20px; border-radius: 20px; font-size: 12px; font-weight: bold; cursor: pointer; margin-top: 10px; display: flex; align-items: center; gap: 8px; }
        
        .footer { margin-top: 40px; padding: 20px; text-align: center; color: #444; font-size: 10px; border-top: 1px solid #111; width: 100%; }
    </style>
</head>
<body>
    <div id="sales-ticker"><span id="ticker-text"></span></div>

    <div class="hero">
        <h1>SENSORY HUB 🔞</h1>

    <div class="game-grid">

        <div class="game-card" onclick="window.location.href='tetris.html'">

                <p>消除的快感，连消的巅峰音效</p>
            </div>
        </div>
    </div>

    <div style="margin-top: 20px; text-align: center; width: 100%; padding: 0 20px; box-sizing: border-box;">
        <button onclick="window.location.href='https://buy.polar.sh/polar_cl_9RGAEljSLFBrY69uqThOy1DDT8TBEXst5eQcv1mTLFf'" 
                style="background: #ff4d4d; color: white; border: none; padding: 15px 40px; border-radius: 30px; font-weight: bold; cursor: pointer; width: 100%; max-width: 300px; font-size: 18px; box-shadow: 0 10px 30px rgba(255,77,77,0.4);">
            解锁全家桶感官包 ($1.99)
        </button>
        
        <center>
            <button class="viral-btn" onclick="shareToX()">
                🐦 分享到 X 获得免费积分
            </button>
        </center>
    </div>

    <div class="footer">
        100% 安全支付 | 由 Polar.sh 提供技术支持
    </div>

    <script>
        function shareToX() {
            const text = encodeURIComponent("I'm addicted to this sensory snake game! 🐍🔞 Try it here: https://tongshan-dai.github.io/sexy-snake/");
            window.open(`https://twitter.com/intent/tweet?text=${text}`, '_blank');
        }

        // 模拟实时成交数据
        const sales = [
            "来自日本的玩家成功购买了【全家桶】🔥",
            "User ***928 刚刚解锁了【50+感官音效】",
            "来自美国的玩家刚刚开启了【心跳震动模式】💓",
            "最新成交：$1.99 终身授权已下发"
        ];

        function showSales() {
            const ticker = document.getElementById('sales-ticker');
            const text = document.getElementById('ticker-text');
            text.innerText = "✨ " + sales[Math.floor(Math.random() * sales.length)];
            ticker.style.display = 'block';
            setTimeout(() => { ticker.style.display = 'none'; }, 5000);
        }

        // 随机触发成交弹窗
        setInterval(() => { if(Math.random() > 0.6) showSales(); }, 12000);

        // 模拟在线人数波动
        setInterval(() => {
            const count = Math.floor(Math.random() * 10) + 8;
            document.getElementById('active-players').innerText = `正在有 ${count} 位玩家在线体验`;
        }, 5000);
    </script>
</body>
</html>
