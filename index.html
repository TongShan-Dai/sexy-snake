<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sexy Snake 🔞 - Sensory Multi-Sound</title>
    <style>
        body { background: #1a1a1a; color: white; font-family: 'Helvetica Neue', Arial, sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: flex-start; height: 100vh; margin: 0; overflow: hidden; touch-action: manipulation; }
        .title-bar { width: 100%; padding: 20px 0; text-align: center; background: linear-gradient(180deg, #2a2a2a 0%, #1a1a1a 100%); border-bottom: 1px solid #333; }
        .title-bar h1 { color: #ff4d4d; font-size: 28px; margin: 0; letter-spacing: 2px; text-shadow: 0 0 10px rgba(255, 77, 77, 0.5); }
        canvas { background: #000; border: 3px solid #ff4d4d; box-shadow: 0 0 30px rgba(255, 77, 77, 0.2); display: none; margin-top: 15px; border-radius: 10px; }
        .info { font-size: 24px; color: #ff4d4d; font-weight: bold; margin: 10px 0; display: none; }
        .controls { display: none; grid-template-columns: repeat(3, 75px); grid-template-rows: repeat(2, 75px); gap: 12px; margin-top: 20px; }
        .btn { background: rgba(255, 77, 77, 0.1); border: 2px solid #ff4d4d; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 26px; color: white; cursor: pointer; -webkit-tap-highlight-color: transparent; }
        .btn:active { background: rgba(255, 77, 77, 0.5); transform: scale(0.9); }
        .btn-up { grid-column: 2; }
        .btn-left { grid-column: 1; grid-row: 2; }
        .btn-down { grid-column: 2; grid-row: 2; }
        .btn-right { grid-column: 3; grid-row: 2; }
        #start-screen { position: absolute; top: 50%; transform: translateY(-50%); text-align: center; width: 100%; }
        #paywall { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.98); display: none; flex-direction: column; align-items: center; justify-content: center; text-align: center; z-index: 100; padding: 25px; box-sizing: border-box; }
        button.main-btn { background: #ff4d4d; color: white; border: none; padding: 18px 45px; border-radius: 40px; font-size: 20px; cursor: pointer; font-weight: bold; margin-top: 25px; box-shadow: 0 6px 20px rgba(255, 77, 77, 0.4); }
    </style>
</head>
<body>
    <div class="title-bar">
        <h1>SEXY SNAKE 🔞</h1>
        <p style="color: #888; font-size: 12px; margin-top: 5px;">随机感官音效，每一口都不同...</p>
    </div>

    <div id="start-screen">
        <p style="font-size: 16px; color: #ccc;">戴上耳机 🎧 收集 12 个点解锁完整版</p>
        <button class="main-btn" onclick="startGame()">开启感官之旅</button>
    </div>

    <div class="info">Score: <span id="score">0</span></div>
    <canvas id="gameCanvas" width="400" height="400"></canvas>

    <div class="controls" id="mobileControls">
        <div class="btn btn-up" onclick="changeDir(0, -1)">▲</div>
        <div class="btn btn-left" onclick="changeDir(-1, 0)">◀</div>
        <div class="btn btn-down" onclick="changeDir(0, 1)">▼</div>
        <div class="btn btn-right" onclick="changeDir(1, 0)">▶</div>
    </div>

    <div id="paywall">
        <h2 style="color: #ff4d4d;">太棒了，想要更多吗？🔥</h2>
        <p style="font-size: 14px; line-height: 1.5;">你已展现出惊人的持久力。支付 <b>$1.99</b> 解锁 50+ 随机音效池、高清立绘及无限畅玩！</p>
        <button class="main-btn" onclick="window.location.href='https://buy.polar.sh/polar_cl_6oWCDP2tElIlXVJCri1uDPMXmnTu330WrVmeE1QhYuP'">立即获取完整版 💳</button>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreEl = document.getElementById('score');
        const paywall = document.getElementById('paywall');
        const startScreen = document.getElementById('start-screen');
        const controls = document.getElementById('mobileControls');
        const info = document.querySelector('.info');

        // 扩充后的随机音效池 (来自多个公用 CDN，涵盖不同情绪)
        const soundUrls = [
            'https://www.myinstants.com/media/sounds/anime-gasp.mp3',
            'https://www.myinstants.com/media/sounds/ara-ara.mp3',
            'https://www.myinstants.com/media/sounds/anime-moan.mp3',
            'https://www.myinstants.com/media/sounds/kawaii-gasp.mp3',
            'https://www.myinstants.com/media/sounds/anime-girl-sigh.mp3',
            'https://www.myinstants.com/media/sounds/cute-anime-girl-voice.mp3',
            'https://www.myinstants.com/media/sounds/onichan.mp3',
            'https://www.myinstants.com/media/sounds/yamete-kudasai.mp3'
        ];
        const audioPool = soundUrls.map(url => new Audio(url));

        let snake = [{x: 10, y: 10}];
        let food = {x: 5, y: 5};
        let dx = 0, dy = -1;
        let score = 0;
        let isGameOver = false;
        let gameStarted = false;

        function startGame() {
            startScreen.style.display = 'none';
            canvas.style.display = 'block';
            info.style.display = 'block';
            controls.style.display = 'grid';
            gameStarted = true;
            audioPool.forEach(s => { s.play().then(() => { s.pause(); s.currentTime = 0; }).catch(() => {}); });
            main();
        }

        function changeDir(nx, ny) {
            if (gameStarted && (dx !== -nx || dy !== -ny)) { dx = nx; dy = ny; }
        }

        function playRandomSexySound() {
            // 随机抽取一个声音播放
            const randomIdx = Math.floor(Math.random() * audioPool.length);
            const sound = audioPool[randomIdx].cloneNode();
            sound.volume = 0.8;
            sound.play().catch(() => {});
        }

        function main() {
            if (isGameOver || !gameStarted) return;
            setTimeout(function onTick() {
                clearCanvas(); drawFood(); advanceSnake(); drawSnake(); main();
            }, 220);
        }

        function clearCanvas() { ctx.fillStyle = "black"; ctx.fillRect(0, 0, canvas.width, canvas.height); }
        function drawSnake() { 
            snake.forEach((part, i) => { 
                ctx.fillStyle = i === 0 ? "#ff4d4d" : "#ff9999"; 
                ctx.fillRect(part.x * 20, part.y * 20, 18, 18); 
            }); 
        }
        
        function advanceSnake() {
            const head = {x: (snake[0].x + dx + 20) % 20, y: (snake[0].y + dy + 20) % 20};
            snake.unshift(head);
            if (head.x === food.x && head.y === food.y) {
                score += 1; scoreEl.innerText = score;
                playRandomSexySound(); // 触发随机音效
                generateFood();
                if (score >= 12) { isGameOver = true; paywall.style.display = 'flex'; }
            } else { snake.pop(); }
        }

        function generateFood() { food.x = Math.floor(Math.random() * 20); food.y = Math.floor(Math.random() * 20); }
        function drawFood() { 
            ctx.fillStyle = "#ffcc00"; ctx.beginPath(); 
            ctx.arc(food.x * 20 + 10, food.y * 20 + 10, 8, 0, 2 * Math.PI); ctx.fill(); 
            ctx.shadowBlur = 15; ctx.shadowColor = "#ffcc00";
        }

        document.addEventListener('keydown', e => {
            if (e.key === 'ArrowUp') changeDir(0, -1);
            if (e.key === 'ArrowDown') changeDir(0, 1);
            if (e.key === 'ArrowLeft') changeDir(-1, 0);
            if (e.key === 'ArrowRight') changeDir(1, 0);
        });
    </script>
</body>
</html>
