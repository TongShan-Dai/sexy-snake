<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sexy Snake 🔞 - Ultimate Sensory</title>
    <style>
        body { background: #0a0a0a; color: white; font-family: 'Segoe UI', system-ui, sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: flex-start; height: 100vh; margin: 0; overflow: hidden; touch-action: manipulation; }
        .title-bar { width: 100%; padding: 15px 0; text-align: center; background: rgba(255, 77, 77, 0.05); border-bottom: 1px solid #222; }
        .title-bar h1 { color: #ff4d4d; font-size: 24px; margin: 0; letter-spacing: 3px; }
        canvas { background: #000; border: 2px solid #333; margin-top: 10px; border-radius: 8px; display: none; }
        .info { font-size: 20px; color: #ff4d4d; font-weight: bold; margin: 10px 0; display: none; }
        
        /* 响应式按键 */
        .controls { display: none; grid-template-columns: repeat(3, 70px); gap: 15px; margin-top: 20px; }
        .btn { background: rgba(255, 77, 77, 0.1); border: 1px solid #ff4d4d; border-radius: 50%; width: 70px; height: 70px; display: flex; align-items: center; justify-content: center; font-size: 24px; color: white; }
        .btn:active { background: rgba(255, 77, 77, 0.4); transform: scale(0.9); }

        #paywall { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.98); display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 1000; text-align: center; padding: 20px; }
        button.main-btn { background: #ff4d4d; color: white; border: none; padding: 15px 40px; border-radius: 30px; font-size: 18px; font-weight: bold; margin-top: 20px; }
    </style>
</head>
<body>
    <div class="title-bar"><h1>SEXY SNAKE 🔞</h1></div>

    <div id="start-screen" style="text-align: center; margin-top: 100px;">
        <p style="color: #888;">沉浸式感官体验：声音、视觉、震动</p>
        <button class="main-btn" onclick="startGame()">开启体验 🎧</button>
    </div>

    <div class="info">Score: <span id="score">0</span></div>
    <canvas id="gameCanvas"></canvas>

    <div class="controls" id="mobileControls">
        <div style="grid-column: 2" class="btn" onclick="changeDir(0, -1)">▲</div>
        <div style="grid-row: 2" class="btn" onclick="changeDir(-1, 0)">◀</div>
        <div style="grid-row: 2" class="btn" onclick="changeDir(0, 1)">▼</div>
        <div style="grid-row: 2" class="btn" onclick="changeDir(1, 0)">▶</div>
    </div>

    <div id="paywall">
        <h2 style="color: #ff4d4d;">感受到那种共鸣了吗？🔥</h2>
        <p>解锁 20+ 段绝赞音效池 & 手机高频反馈</p>
        <button class="main-btn" onclick="window.location.href='https://buy.polar.sh/polar_cl_6oWCDP2tElIlXVJCri1uDPMXmnTu330WrVmeE1QhYuP'">解锁完整感官包 💳</button>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreEl = document.getElementById('score');
        const paywall = document.getElementById('paywall');
        const startScreen = document.getElementById('start-screen');
        const controls = document.getElementById('mobileControls');

        // 音频池配置
        const audioContext = new (window.AudioContext || window.webkitAudioContext)();
        const soundUrls = ['v1.mp3', 'v2.mp3', 'v6.mp3', 'v7.mp3', 'v8.mp3'].map(v => `sounds/${v}`);
        let audioPool = [];

        // 粒子系统
        let particles = [];
        class Particle {
            constructor(x, y, color) {
                this.x = x; this.y = y; this.color = color;
                this.size = Math.random() * 5 + 2;
                this.speedX = (Math.random() - 0.5) * 8;
                this.speedY = (Math.random() - 0.5) * 8;
                this.alpha = 1;
            }
            update() { this.x += this.speedX; this.y += this.speedY; this.alpha -= 0.02; }
            draw() {
                ctx.save(); ctx.globalAlpha = this.alpha;
                ctx.fillStyle = this.color;
                ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI*2); ctx.fill();
                ctx.restore();
            }
        }

        let snake = [{x: 10, y: 10}];
        let food = {x: 5, y: 5};
        let dx = 0, dy = -1;
        let score = 0;
        let isGameOver = false;

        function startGame() {
            startScreen.style.display = 'none';
            canvas.style.display = 'block';
            document.querySelector('.info').style.display = 'block';
            controls.style.display = 'grid';
            resizeCanvas();
            gameLoop();
        }

        function resizeCanvas() {
            const size = Math.min(window.innerWidth * 0.9, 400);
            canvas.width = size; canvas.height = size;
        }

        function createBurst(x, y) {
            for(let i=0; i<15; i++) particles.push(new Particle(x, y, '#ffcc00'));
        }

        function handleFeedback() {
            // 1. 声音随机触发
            const sound = new Audio(soundUrls[Math.floor(Math.random()*soundUrls.length)]);
            sound.play().catch(() => {});
            // 2. 手机震动 (移动端特有)
            if (navigator.vibrate) navigator.vibrate([30, 50, 30]);
            // 3. 屏幕闪烁
            canvas.style.borderColor = '#ffcc00';
            setTimeout(() => canvas.style.borderColor = '#ff4d4d', 100);
        }

        function gameLoop() {
            if (isGameOver) return;
            setTimeout(() => {
                ctx.fillStyle = 'black'; ctx.fillRect(0, 0, canvas.width, canvas.height);
                
                // 更新粒子
                particles = particles.filter(p => p.alpha > 0);
                particles.forEach(p => { p.update(); p.draw(); });

                // 蛇逻辑
                const cellSize = canvas.width / 20;
                const head = {x: (snake[0].x + dx + 20) % 20, y: (snake[0].y + dy + 20) % 20};
                snake.unshift(head);

                if (head.x === food.x && head.y === food.y) {
                    score++; scoreEl.innerText = score;
                    createBurst(head.x * cellSize + cellSize/2, head.y * cellSize + cellSize/2);
                    handleFeedback();
                    food = {x: Math.floor(Math.random()*20), y: Math.floor(Math.random()*20)};
                    if (score >= 12) { isGameOver = true; paywall.style.display = 'flex'; }
                } else { snake.pop(); }

                // 绘蛇
                snake.forEach((p, i) => {
                    ctx.fillStyle = i === 0 ? '#ff4d4d' : '#ff9999';
                    ctx.fillRect(p.x * cellSize, p.y * cellSize, cellSize-2, cellSize-2);
                });
                // 绘点
                ctx.fillStyle = '#ffcc00'; ctx.beginPath();
                ctx.arc(food.x * cellSize + cellSize/2, food.y * cellSize + cellSize/2, cellSize/2.5, 0, Math.PI*2); ctx.fill();

                gameLoop();
            }, 220);
        }

        function changeDir(nx, ny) { if (dx !== -nx || dy !== -ny) { dx = nx; dy = ny; } }
        document.addEventListener('keydown', e => {
            if (e.key === 'ArrowUp') changeDir(0, -1);
            if (e.key === 'ArrowDown') changeDir(0, 1);
            if (e.key === 'ArrowLeft') changeDir(-1, 0);
            if (e.key === 'ArrowRight') changeDir(1, 0);
        });
    </script>
</body>
</html>
